<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        font-family:sans-serif;
        box-sizing: border-box;
    }
    body{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: hsl(241, 100%, 89%);
    }
    .container{
          display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    }
    .page1{
        background-image: linear-gradient( hsl(252, 100%, 67%),hsl(241, 81%, 54%));
        height: 29rem;
        width: 23rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
              color: white;
    position: relative;
    z-index: 2;

    }
    .score{
        background-image: linear-gradient( hsla(256, 72%, 46%, 1),hsla(241, 72%, 46%, 0));
        text-align: center;
        height: 150px;
        width: 150px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-bottom: 20px;
    }
    .head{
        margin-bottom: 50px;
        color:  hsl(224, 56%, 71%)
;
    }
    .score span{
        font-size: 50px;
        margin-bottom: 10px;
        margin-top: 10px;
    }
    .score p{
        font-size: 14px;
        color: grey;
    }
    .greet{
        font-size: 30px;
        
        margin-bottom: 20px;
    }
    .page1 p{
        text-align: center;
        font-size: 17px;
        color: grey;
    }
   .page2{
    background: #ffffff;
    padding: 35px;
    width: 320px;
    border-top-right-radius:20px ;
    border-bottom-right-radius: 20px;
    font-family: sans-serif;
    height: 29rem;
        width: 23rem;
        position: relative;
        z-index: 1;
        margin-left: -20px;

}

.page2 h2{
    margin-bottom: 25px;
    font-size: 22px;
}
    .page2 div{
         padding: 14px 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    }
    .page2 p{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0;
    font-weight: 600;
    font-size: 15px;
}
.reaction{
    background: #fff6f5;
    color: #ff5757;
}

.memory{
    background: #fffbf2;
    color: #f5a623;
}

.verbal{
    background: #f2fbfa;
    color: #00a896;
}

.visual{
    background: #f4f3ff;
    color: #6c63ff; }

button{
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: #2d3250;
    color: white;
    font-weight: 600;
    margin-top: 20px;
    cursor: pointer;
}
button:hover{
    background-color:#2a3571;
    color: rgba(187, 187, 208, 0.415);
}
.page1, .page2{
    width: 50%;
}

</style>
<body>
    <section class="container">
        <div class="page1">
            <h2 class="head">Your Result</h2>
            <div class="score"><span>76</span>
            <p>of 100</p></div>
            <h2 class="greet">Great</h2>
            <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        <div class="page2">
            <h2>Summary</h2>
            <div class="reaction"><p>Reaction<span>80/100</span></p></div>
            <div class="memory"><p>Memory<span>92/100</span></p></div>
            <div class="verbal"><p>Verbal<span>61/100</span></p></div>
            <div class=".visual"><p>Visual<span>73/100</span></p></div>
            <button>Continue</button>
        </div>
    </section>
</body>
</html>
